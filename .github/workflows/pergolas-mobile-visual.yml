name: Pergolas mobile visual guard

on:
  push:
    branches: [main]
    paths:
      - 'src/pages/pergolas.astro'
      - 'src/components/sections/PergolasTeaserSection.astro'
      - 'src/components/ui/PergolaMobileV3.astro'
      - 'src/styles/pergolas-mobile-first.css'
      - 'src/layouts/BaseLayout.astro'
      - '.github/workflows/pergolas-mobile-visual.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mobile-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/raluma-preview.log 2>&1 &
          for attempt in $(seq 1 40); do
            curl -fsS http://127.0.0.1:4321/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/raluma-preview.log
          exit 1

      - name: Check mobile layouts
        run: |
          mkdir -p screenshots .verification
          node <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const widths = [320, 390, 430];

            for (const width of widths) {
              const page = await browser.newPage({ viewport: { width, height: 844 }, deviceScaleFactor: 1 });

              await page.goto('http://127.0.0.1:4321/', { waitUntil: 'networkidle' });
              await page.locator('.pergolas-teaser').scrollIntoViewIfNeeded();
              await page.locator('.pergolas-teaser .rise').evaluate((el) => el.classList.add('is-in'));
              await page.waitForTimeout(150);

              const teaserFailure = await page.locator('.pergolas-teaser__title').evaluate((el) => {
                const style = getComputedStyle(el);
                const lineHeight = parseFloat(style.lineHeight) || parseFloat(style.fontSize) * 1.2;
                return {
                  lines: el.getBoundingClientRect().height / lineHeight,
                  overflow: el.scrollWidth > el.clientWidth + 1,
                  nowrap: style.whiteSpace === 'nowrap',
                  fontSize: parseFloat(style.fontSize),
                };
              });
              const homeOverflow = await page.evaluate(() => document.documentElement.scrollWidth > document.documentElement.clientWidth + 1);
              if (teaserFailure.lines > 1.15 || teaserFailure.overflow || !teaserFailure.nowrap || teaserFailure.fontSize < 16 || homeOverflow) {
                throw new Error(`Homepage teaser heading failure at ${width}px: ${JSON.stringify(teaserFailure)}`);
              }
              await page.locator('.pergolas-teaser').screenshot({ path: `screenshots/home-pergolas-${width}.png` });

              await page.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle' });
              await page.locator('.rise').evaluateAll((items) => items.forEach((el) => el.classList.add('is-in')));
              await page.waitForTimeout(180);

              const pageOverflow = await page.evaluate(() => document.documentElement.scrollWidth > document.documentElement.clientWidth + 1);
              const headingFailures = await page.locator('.pergolas-page h1, .pergolas-page h2, .pergolas-page h3').evaluateAll((headings) => headings.map((el) => {
                const style = getComputedStyle(el);
                const lineHeight = parseFloat(style.lineHeight) || parseFloat(style.fontSize) * 1.2;
                return {
                  text: (el.textContent || '').trim(),
                  lines: el.getBoundingClientRect().height / lineHeight,
                  overflow: el.scrollWidth > el.clientWidth + 1,
                  nowrap: style.whiteSpace === 'nowrap',
                  fontSize: parseFloat(style.fontSize),
                };
              }).filter((item) => item.lines > 1.15 || item.overflow || !item.nowrap || item.fontSize < 14));
              if (pageOverflow || headingFailures.length) {
                throw new Error(`Pergolas heading failure at ${width}px: ${JSON.stringify(headingFailures)}`);
              }

              const optionFailures = await page.locator('.pergola-option').evaluateAll((cards) => cards.map((card) => {
                const body = card.querySelector(':scope > div');
                const image = card.querySelector('img');
                const title = card.querySelector('h3');
                const paragraph = card.querySelector('p:last-child');
                return {
                  title: title ? (title.textContent || '').trim() : '',
                  bodyPadding: body ? parseFloat(getComputedStyle(body).paddingLeft) : 0,
                  imageHeight: image ? image.getBoundingClientRect().height : 0,
                  titleSize: title ? parseFloat(getComputedStyle(title).fontSize) : 0,
                  paragraphSize: paragraph ? parseFloat(getComputedStyle(paragraph).fontSize) : 0,
                };
              }).filter((item) => item.bodyPadding < 18 || item.imageHeight < 150 || item.titleSize < 14 || item.paragraphSize < 14));
              if (optionFailures.length) {
                throw new Error(`Options readability failure at ${width}px: ${JSON.stringify(optionFailures)}`);
              }

              await page.screenshot({ path: `screenshots/pergolas-${width}.png`, fullPage: true });
              await page.close();
            }

            await browser.close();
            fs.writeFileSync('.verification/pergolas-mobile-success.txt', [
              'status=success',
              `source_commit=${process.env.GITHUB_SHA}`,
              `verified_widths=${widths.join(',')}`,
              'heading_policy=nowrap-v3',
              'options_readability=success',
              `verified_at=${new Date().toISOString()}`,
              ''
            ].join('\n'));
          })();
          NODE

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: pergolas-mobile-screenshots
          path: screenshots/*.png
          retention-days: 7

      - name: Record successful verification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .verification/pergolas-mobile-success.txt
          git commit -m "chore: record pergola mobile verification" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
