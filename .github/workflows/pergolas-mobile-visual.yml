name: Pergolas mobile visual guard

on:
  push:
    branches: [main]
    paths:
      - 'src/pages/pergolas.astro'
      - 'src/components/sections/PergolasTeaserSection.astro'
      - 'src/components/ui/PergolaMobileV3.astro'
      - 'src/styles/pergolas-mobile-first.css'
      - 'src/layouts/BaseLayout.astro'
      - '.github/workflows/pergolas-mobile-visual.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pergolas-mobile-visual-v4
  cancel-in-progress: true

jobs:
  mobile-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/raluma-preview.log 2>&1 &
          for attempt in $(seq 1 40); do
            curl -fsS http://127.0.0.1:4321/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/raluma-preview.log
          exit 1

      - name: Check typography and cards
        id: visual
        continue-on-error: true
        run: |
          mkdir -p screenshots .verification
          set +e
          node <<'NODE' > /tmp/pergola-visual.log 2>&1
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const widths = [320, 390, 430];

            for (const width of widths) {
              const page = await browser.newPage({ viewport: { width, height: 844 }, deviceScaleFactor: 1 });

              await page.goto('http://127.0.0.1:4321/', { waitUntil: 'networkidle' });
              await page.locator('.pergolas-teaser').scrollIntoViewIfNeeded();
              await page.locator('.pergolas-teaser .rise').evaluate((el) => el.classList.add('is-in'));
              await page.waitForTimeout(120);

              const teaser = await page.locator('.pergolas-teaser__title').evaluate((el) => {
                const style = getComputedStyle(el);
                return {
                  fontSize: parseFloat(style.fontSize),
                  nowrap: style.whiteSpace === 'nowrap',
                  overflow: el.scrollWidth > el.clientWidth + 1,
                };
              });
              const homeOverflow = await page.evaluate(() => document.documentElement.scrollWidth > document.documentElement.clientWidth + 1);
              if (!teaser.nowrap || teaser.overflow || teaser.fontSize < 20 || homeOverflow) {
                throw new Error(`Homepage typography failure at ${width}px: ${JSON.stringify(teaser)}`);
              }
              await page.locator('.pergolas-teaser').screenshot({ path: `screenshots/home-pergolas-${width}.png` });

              await page.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle' });
              await page.locator('.rise').evaluateAll((items) => items.forEach((el) => el.classList.add('is-in')));
              await page.waitForTimeout(160);

              const result = await page.evaluate(() => {
                const sizes = (selector) => [...document.querySelectorAll(selector)].map((el) => parseFloat(getComputedStyle(el).fontSize));
                const unique = (values) => [...new Set(values.map((value) => value.toFixed(2)))];
                const headings = [...document.querySelectorAll('.pergolas-page h1, .pergolas-page h2, .pergolas-page h3')].map((el) => ({
                  text: (el.textContent || '').trim(),
                  nowrap: getComputedStyle(el).whiteSpace === 'nowrap',
                  overflow: el.scrollWidth > el.clientWidth + 1,
                }));
                const benefits = [...document.querySelectorAll('.pergola-benefit')].map((card) => {
                  const rect = card.getBoundingClientRect();
                  const title = card.querySelector('h3');
                  const paragraph = card.querySelector('p');
                  const style = getComputedStyle(card);
                  return {
                    title: title ? (title.textContent || '').trim() : '',
                    overflowY: style.overflowY,
                    clipped: card.scrollHeight > card.clientHeight + 1,
                    widthOverflow: rect.right > document.documentElement.clientWidth + 1 || rect.left < -1,
                    titleVisible: !!title && title.getBoundingClientRect().bottom <= rect.bottom + 1,
                    paragraphVisible: !!paragraph && paragraph.getBoundingClientRect().bottom <= rect.bottom + 1,
                    padding: parseFloat(style.paddingLeft),
                  };
                });
                return {
                  pageOverflow: document.documentElement.scrollWidth > document.documentElement.clientWidth + 1,
                  h1: unique(sizes('.pergolas-page h1')),
                  h2: unique(sizes('.pergolas-page h2')),
                  h3: unique(sizes('.pergolas-page h3')),
                  leads: unique(sizes('.pergola-hero__lead, .pergola-head .lead, .pergola-climate__intro > p:last-child, .pergola-glazing__intro > p:not(.eyebrow), .pergola-final-cta p:not(.eyebrow), .pergola-faq__intro .lead')),
                  bodies: unique(sizes('.pergola-type p:not(.pergola-type__number), .pergola-spec p, .pergola-glazing__system p, .pergola-benefit p, .pergola-process__steps p')),
                  headingFailures: headings.filter((item) => !item.nowrap || item.overflow),
                  benefitFailures: benefits.filter((item) => item.clipped || item.widthOverflow || !item.titleVisible || !item.paragraphVisible || item.padding < 18 || item.overflowY === 'hidden' || item.overflowY === 'clip'),
                };
              });

              if (result.pageOverflow || result.h1.length !== 1 || result.h2.length !== 1 || result.h3.length !== 1 || result.leads.length !== 1 || result.bodies.length !== 1 || result.headingFailures.length || result.benefitFailures.length) {
                throw new Error(`Mobile visual failure at ${width}px: ${JSON.stringify(result)}`);
              }

              await page.locator('.pergola-benefits').screenshot({ path: `screenshots/pergola-benefits-${width}.png` });
              await page.screenshot({ path: `screenshots/pergolas-${width}.png`, fullPage: true });
              await page.close();
            }

            await browser.close();
          })();
          NODE
          code=$?
          {
            if [ "$code" -eq 0 ]; then
              echo 'status=success'
            else
              echo 'status=failure'
            fi
            echo "source_commit=${GITHUB_SHA}"
            echo 'verified_widths=320,390,430'
            echo 'typography_scale=unified-v4'
            echo "benefit_cards=$([ "$code" -eq 0 ] && echo success || echo failure)"
            echo "verified_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            if [ "$code" -ne 0 ]; then
              echo 'error<<EOF'
              tail -n 20 /tmp/pergola-visual.log
              echo 'EOF'
            fi
          } > .verification/pergolas-mobile-v4-result.txt
          cat /tmp/pergola-visual.log
          exit "$code"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pergolas-mobile-v4-screenshots
          path: screenshots/*.png
          retention-days: 7

      - name: Record verification result
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .verification/pergolas-mobile-v4-result.txt
          git commit -m "chore: record pergola mobile v4 result" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Enforce result
        if: always()
        run: grep -q '^status=success$' .verification/pergolas-mobile-v4-result.txt
