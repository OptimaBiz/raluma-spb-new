name: Probe production roof viewer V7

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/probe-production-roof-v7.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Probe production until V7 appears
        run: |
          python -m pip install --quiet pillow
          set +e
          mkdir -p .verification
          report=.verification/production-roof-v7-probe.txt
          : > "$report"

          for attempt in $(seq 1 40); do
            html="$(curl -fsSL --connect-timeout 15 --max-time 30 'https://raluma.com.ru/pergolas/' || true)"
            printf '%s' "$html" > /tmp/pergolas.html

            closed_status="$(curl -sSL --connect-timeout 15 --max-time 30 -o /tmp/roof-closed.jpg -w '%{http_code}' 'https://raluma.com.ru/images/pergolas/roof-closed.jpg?v=7' || true)"
            half_status="$(curl -sSL --connect-timeout 15 --max-time 30 -o /tmp/roof-half-open.jpg -w '%{http_code}' 'https://raluma.com.ru/images/pergolas/roof-half-open.jpg?v=7' || true)"
            open_status="$(curl -sSL --connect-timeout 15 --max-time 30 -o /tmp/roof-open.jpg -w '%{http_code}' 'https://raluma.com.ru/images/pergolas/roof-open.jpg?v=7' || true)"

            has_v7=no
            grep -q 'data-roof-real-photos="v7"' /tmp/pergolas.html && has_v7=yes
            has_closed=no
            grep -q 'roof-closed.jpg?v=7' /tmp/pergolas.html && has_closed=yes
            has_half=no
            grep -q 'roof-half-open.jpg?v=7' /tmp/pergolas.html && has_half=yes
            has_open=no
            grep -q 'roof-open.jpg?v=7' /tmp/pergolas.html && has_open=yes
            legacy_call=no
            grep -q 'initRoofInteraction();' /tmp/pergolas.html && legacy_call=yes

            decode=no
            if [ "$closed_status" = 200 ] && [ "$half_status" = 200 ] && [ "$open_status" = 200 ]; then
              python - <<'PY' >/tmp/pixel-report.txt 2>&1
          from pathlib import Path
          from PIL import Image, ImageChops, ImageStat

          paths = [Path('/tmp/roof-closed.jpg'), Path('/tmp/roof-half-open.jpg'), Path('/tmp/roof-open.jpg')]
          images = []
          for path in paths:
              with Image.open(path) as source:
                  source.load()
                  image = source.convert('RGB')
              gray = image.convert('L')
              stats = ImageStat.Stat(gray)
              low, high = gray.getextrema()
              print(f'{path.name}: size={image.size} range={low}..{high} mean={stats.mean[0]:.2f} stddev={stats.stddev[0]:.2f}')
              if image.width < 480 or image.height < 300 or high - low < 18 or stats.stddev[0] < 5:
                  raise SystemExit(1)
              images.append(image.resize((480, 312)))

          for left in range(3):
              for right in range(left + 1, 3):
                  diff = ImageChops.difference(images[left], images[right])
                  rms = sum(ImageStat.Stat(diff).rms) / 3
                  print(f'difference {left + 1}-{right + 1}: rms={rms:.2f}')
                  if rms < 4:
                      raise SystemExit(1)
          PY
              [ $? -eq 0 ] && decode=yes
            else
              : > /tmp/pixel-report.txt
            fi

            {
              echo "attempt=$attempt"
              echo "checked_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              echo "html_bytes=${#html}"
              echo "has_v7=$has_v7"
              echo "has_closed_reference=$has_closed"
              echo "has_half_reference=$has_half"
              echo "has_open_reference=$has_open"
              echo "legacy_initializer_call=$legacy_call"
              echo "closed_status=$closed_status"
              echo "half_status=$half_status"
              echo "open_status=$open_status"
              echo "pixel_decode=$decode"
              cat /tmp/pixel-report.txt
            } > "$report"

            if [ "$has_v7" = yes ] && [ "$has_closed" = yes ] && [ "$has_half" = yes ] && [ "$has_open" = yes ] && [ "$decode" = yes ]; then
              sed -i '1i status=success' "$report"
              exit 0
            fi

            sleep 8
          done

          sed -i '1i status=failure' "$report"

      - name: Record production probe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .verification/production-roof-v7-probe.txt
          git commit -m "chore: record production roof v7 probe" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
