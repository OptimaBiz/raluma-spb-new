name: One-shot responsive roof title fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/one-shot-roof-title-wrap.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Make roof heading responsive
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/ui/PergolaMobileV3.astro')
          text = path.read_text(encoding='utf-8')

          css_marker = '  @media (max-width: 340px) {'
          css_block = '''  /* The roof section title must wrap naturally instead of being fitted to one line. */
          @media (max-width: 820px) {
            #pergola-roof-title {
              width: 100% !important;
              max-width: 100% !important;
              height: auto !important;
              white-space: normal !important;
              text-wrap: wrap !important;
              overflow: visible !important;
              text-overflow: clip !important;
              overflow-wrap: normal !important;
              word-break: normal !important;
              hyphens: none !important;
              font-size: clamp(28px, 8.2vw, 40px) !important;
              line-height: 1.08 !important;
              letter-spacing: -0.035em !important;
            }
          }

'''
          if '#pergola-roof-title {' not in text:
              if css_marker not in text:
                  raise SystemExit('CSS insertion marker not found')
              text = text.replace(css_marker, css_block + css_marker, 1)

          function_marker = '''    function fitHeading(el) {
      if (!window.matchMedia('(max-width: 820px)').matches) {'''
          function_replacement = '''    function fitHeading(el) {
      if (el.id === 'pergola-roof-title') {
        el.style.removeProperty('font-size');
        el.style.removeProperty('letter-spacing');
        return;
      }

      if (!window.matchMedia('(max-width: 820px)').matches) {'''
          if "el.id === 'pergola-roof-title'" not in text:
              if function_marker not in text:
                  raise SystemExit('fitHeading insertion marker not found')
              text = text.replace(function_marker, function_replacement, 1)

          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/one-shot-roof-title-wrap.yml

      - name: Commit responsive fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ui/PergolaMobileV3.astro .github/workflows/one-shot-roof-title-wrap.yml
          git commit -m "fix: allow pergola roof heading to wrap on narrow screens"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify built responsive rules
        run: |
          grep -q "Удобное управление ламелями" dist/pergolas/index.html
          grep -q "pergola-roof-title" dist/pergolas/index.html
          grep -q "text-wrap: wrap" dist/pergolas/index.html
          grep -q "el.id === 'pergola-roof-title'" dist/pergolas/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify production
        run: |
          for attempt in $(seq 1 30); do
            html="$(curl -fsSL --connect-timeout 15 --max-time 30 'https://raluma.com.ru/pergolas/' || true)"
            if grep -q "Удобное управление ламелями" <<<"$html" \
              && grep -q "text-wrap: wrap" <<<"$html" \
              && grep -q "el.id === 'pergola-roof-title'" <<<"$html"; then
              echo "Responsive roof heading verified in production"
              exit 0
            fi
            echo "Attempt $attempt: waiting for production"
            sleep 10
          done
          echo "Production responsive heading was not verified"
          exit 1
