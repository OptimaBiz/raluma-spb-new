name: Apply pergola nowrap mobile fixes

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-pergola-nowrap-v3.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply mobile typography and options fixes
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          page_path = Path('src/pages/pergolas.astro')
          page = page_path.read_text()
          replacements = [
              ('<main class="pergolas-page">', '<main class="pergolas-page" data-mobile-layout="nowrap-v3">', 'landing marker'),
              ('Биоклиматические перголы под ключ\n          </h1>', 'Биоклиматические перголы\n          </h1>', 'hero title'),
              ('Два решения для разных сценариев', 'Два типа крыши', 'types title'),
              ('Регулируемая биоклиматическая крыша', 'Ламельная крыша', 'louvered title'),
              ('Пергола со стеклянной крышей', 'Стеклянная крыша', 'glass title'),
              ('Не летний навес, а инженерная конструкция', 'Инженерная конструкция', 'climate title'),
              ('Погода меняется — пространство остаётся вашим', 'Три режима крыши', 'roof title'),
              ('Стандартные модули и индивидуальный проект', 'Размеры и конфигурации', 'sizes title'),
              ('Индивидуальный размер', 'Размер под объект', 'custom size title'),
              ('Из открытой террасы — в защищённое пространство', 'Остекление перголы', 'glazing title'),
              ('Терраса работает дольше и выглядит частью дома', 'Комфорт круглый сезон', 'benefits title'),
              ('Управляемое естественное освещение', 'Свет по вашему сценарию', 'light benefit'),
              ('Режим естественной вентиляции', 'Естественная вентиляция', 'air benefit'),
              ('Водоотвод спрятан в конструкции', 'Скрытый водоотвод', 'water benefit'),
              ('Единая архитектура с домом', 'В едином стиле с домом', 'architecture benefit'),
              ('Не только белый или графит', 'Цвета, стекло и комфорт', 'options title'),
              ('Окрашивание по RAL и декор', 'Цвет по RAL и декор', 'finish title'),
              ('От фотографии участка до настроенной автоматики', 'Как создаётся пергола', 'process title'),
              ('Пришлите фотографию фасада или участка', 'Расчёт по фотографии', 'final title'),
          ]
          for old, new, label in replacements:
              page = replace_once(page, old, new, label)

          page = replace_once(
              page,
              '<h3>Прозрачное, осветлённое или тонированное стекло</h3>',
              '<h3>Три варианта стекла</h3>\n              <p>Прозрачное, осветлённое или тонированное — под свет, приватность и архитектуру.</p>',
              'glass option copy',
          )
          page = replace_once(
              page,
              '<h3>Освещение, датчики погоды и обогрев</h3>',
              '<h3>Свет, датчики и обогрев</h3>\n              <p>Интегрируем освещение, погодную автоматику и обогрев без визуального перегруза.</p>',
              'comfort option copy',
          )
          page_path.write_text(page)

          teaser_path = Path('src/components/sections/PergolasTeaserSection.astro')
          teaser = teaser_path.read_text()
          teaser = replace_once(
              teaser,
              '<section class="pergolas-teaser" aria-labelledby="pergolas-teaser-title">',
              '<section class="pergolas-teaser" aria-labelledby="pergolas-teaser-title" data-mobile-layout="nowrap-v3">',
              'teaser marker',
          )
          teaser_path.write_text(teaser)

          css_path = Path('src/styles/pergolas-mobile-first.css')
          css = css_path.read_text()
          marker = '/* Pergola nowrap and readable options v3. */'
          if marker in css:
              raise SystemExit('CSS v3 marker already exists')
          css += r'''

          /* Pergola nowrap and readable options v3. */
          @media (max-width: 820px) {
            .pergolas-teaser__title,
            .pergolas-page h1,
            .pergolas-page h2,
            .pergolas-page h3 {
              display: block;
              width: 100%;
              max-width: 100% !important;
              white-space: nowrap !important;
              text-wrap: nowrap !important;
              overflow-wrap: normal !important;
              word-break: normal !important;
              hyphens: none !important;
            }

            .pergolas-teaser__title {
              font-size: clamp(20px, 6.4vw, 36px) !important;
              line-height: 1.04;
            }

            .pergola-hero__title {
              font-size: clamp(21px, 6.8vw, 40px) !important;
              line-height: 1.03;
            }

            .pergola-head .title,
            .pergola-climate__intro h2,
            .pergola-glazing__intro h2,
            .pergola-process__head h2,
            .pergola-final-cta h2,
            .pergola-faq__intro h2 {
              font-size: clamp(20px, 6.2vw, 34px) !important;
              line-height: 1.06;
            }

            .pergola-type h3,
            .pergola-option h3,
            .pergola-size--custom h3,
            .pergola-benefit h3 {
              font-size: clamp(18px, 5.5vw, 28px) !important;
              line-height: 1.08;
            }

            .pergola-options__grid {
              grid-template-columns: 1fr !important;
              gap: 16px !important;
            }

            .pergola-option,
            .pergola-option--large {
              display: block !important;
              grid-column: auto !important;
              min-height: 0 !important;
              border: 1px solid var(--c-seam);
              background: var(--c-light);
            }

            .pergola-option img {
              display: block;
              width: 100%;
              height: auto !important;
              aspect-ratio: 16 / 10 !important;
              object-fit: cover;
              object-position: center;
            }

            .pergola-option > div {
              display: block !important;
              padding: 22px 20px 24px !important;
              border-top: 1px solid var(--c-seam);
            }

            .pergola-option .eyebrow {
              margin: 0 0 10px;
              font-size: 11px;
              line-height: 1.35;
            }

            .pergola-option h3 {
              margin: 0 !important;
            }

            .pergola-option p:last-child {
              max-width: 42ch;
              margin: 12px 0 0 !important;
              font-size: 15px;
              line-height: 1.55;
              color: var(--c-ink-soft);
            }
          }

          @media (max-width: 380px) {
            .pergolas-teaser__title { font-size: 19px !important; }
            .pergola-hero__title { font-size: 20px !important; }
            .pergola-head .title,
            .pergola-climate__intro h2,
            .pergola-glazing__intro h2,
            .pergola-process__head h2,
            .pergola-final-cta h2,
            .pergola-faq__intro h2 { font-size: 19px !important; }
            .pergola-type h3,
            .pergola-option h3,
            .pergola-size--custom h3,
            .pergola-benefit h3 { font-size: 17px !important; }
          }
          '''
          css_path.write_text(css)

          layout_path = Path('src/layouts/BaseLayout.astro')
          layout = layout_path.read_text()
          script_marker = '<!-- Pergola single-line heading fitter v3 -->'
          if script_marker in layout:
              raise SystemExit('Heading fitter already exists')
          fitter = r'''

              <!-- Pergola single-line heading fitter v3 -->
              <script is:inline>
                (function () {
                  var selector = '.pergolas-teaser__title, .pergolas-page h1, .pergolas-page h2, .pergolas-page h3';
                  var timer;

                  function fitHeading(el) {
                    el.style.removeProperty('font-size');
                    el.style.removeProperty('white-space');
                    if (!window.matchMedia('(max-width: 820px)').matches) return;

                    el.style.whiteSpace = 'nowrap';
                    var size = parseFloat(window.getComputedStyle(el).fontSize) || 20;
                    var minimum = el.tagName === 'H3' ? 14 : 16;
                    var guard = 80;

                    while (el.scrollWidth > el.clientWidth + 0.5 && size > minimum && guard > 0) {
                      size -= 0.5;
                      el.style.fontSize = size + 'px';
                      guard -= 1;
                    }
                  }

                  function fitAll() {
                    document.querySelectorAll(selector).forEach(fitHeading);
                  }

                  function scheduleFit() {
                    window.clearTimeout(timer);
                    timer = window.setTimeout(fitAll, 50);
                  }

                  if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', fitAll, { once: true });
                  } else {
                    fitAll();
                  }

                  if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitAll);
                  window.addEventListener('resize', scheduleFit, { passive: true });
                })();
              </script>
          '''
          layout = replace_once(layout, '  </body>', fitter + '\n  </body>', 'heading fitter insertion')
          layout_path.write_text(layout)

          visual_path = Path('.github/workflows/pergolas-mobile-visual.yml')
          visual_path.write_text(r'''name: Pergolas mobile visual guard

          on:
            push:
              branches: [main]
              paths:
                - 'src/pages/pergolas.astro'
                - 'src/components/sections/PergolasTeaserSection.astro'
                - 'src/styles/pergolas-mobile-first.css'
                - 'src/layouts/BaseLayout.astro'
                - '.github/workflows/pergolas-mobile-visual.yml'
            workflow_dispatch:

          permissions:
            contents: write

          jobs:
            mobile-visual:
              runs-on: ubuntu-latest
              timeout-minutes: 12
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                  with:
                    ref: main

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm

                - name: Install dependencies
                  run: npm ci

                - name: Build
                  run: npm run build

                - name: Install Playwright
                  run: |
                    npm install --no-save playwright
                    npx playwright install --with-deps chromium

                - name: Start preview
                  run: |
                    npm run preview -- --host 127.0.0.1 > /tmp/raluma-preview.log 2>&1 &
                    for attempt in $(seq 1 40); do
                      curl -fsS http://127.0.0.1:4321/ >/dev/null && exit 0
                      sleep 1
                    done
                    cat /tmp/raluma-preview.log
                    exit 1

                - name: Check mobile layouts
                  run: |
                    mkdir -p screenshots .verification
                    node <<'NODE'
                    const { chromium } = require('playwright');
                    const fs = require('fs');

                    function lineCount(el) {
                      const style = getComputedStyle(el);
                      const lineHeight = parseFloat(style.lineHeight) || parseFloat(style.fontSize) * 1.2;
                      return el.getBoundingClientRect().height / lineHeight;
                    }

                    (async () => {
                      const browser = await chromium.launch({ headless: true });
                      const widths = [320, 390, 430];

                      for (const width of widths) {
                        const page = await browser.newPage({ viewport: { width, height: 844 }, deviceScaleFactor: 1 });

                        await page.goto('http://127.0.0.1:4321/', { waitUntil: 'networkidle' });
                        await page.locator('.pergolas-teaser').scrollIntoViewIfNeeded();
                        await page.locator('.pergolas-teaser .rise').evaluate((el) => el.classList.add('is-in'));
                        await page.waitForTimeout(120);
                        const teaserTitle = page.locator('.pergolas-teaser__title');
                        const teaserFailure = await teaserTitle.evaluate((el) => ({
                          lines: lineCount(el),
                          overflow: el.scrollWidth > el.clientWidth + 1,
                          nowrap: getComputedStyle(el).whiteSpace === 'nowrap',
                        }));
                        const homeOverflow = await page.evaluate(() => document.documentElement.scrollWidth > document.documentElement.clientWidth + 1);
                        if (teaserFailure.lines > 1.15 || teaserFailure.overflow || !teaserFailure.nowrap || homeOverflow) {
                          throw new Error(`Homepage teaser heading failure at ${width}px: ${JSON.stringify(teaserFailure)}`);
                        }
                        await page.locator('.pergolas-teaser').screenshot({ path: `screenshots/home-pergolas-${width}.png` });

                        await page.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle' });
                        await page.locator('.rise').evaluateAll((items) => items.forEach((el) => el.classList.add('is-in')));
                        await page.waitForTimeout(150);
                        const pageOverflow = await page.evaluate(() => document.documentElement.scrollWidth > document.documentElement.clientWidth + 1);
                        const headingFailures = await page.locator('.pergolas-page h1, .pergolas-page h2, .pergolas-page h3').evaluateAll((headings) => headings.map((el) => ({
                          text: el.textContent.trim(),
                          lines: lineCount(el),
                          overflow: el.scrollWidth > el.clientWidth + 1,
                          nowrap: getComputedStyle(el).whiteSpace === 'nowrap',
                          fontSize: parseFloat(getComputedStyle(el).fontSize),
                        })).filter((item) => item.lines > 1.15 || item.overflow || !item.nowrap || item.fontSize < 14));
                        if (pageOverflow || headingFailures.length) {
                          throw new Error(`Pergolas heading failure at ${width}px: ${JSON.stringify(headingFailures)}`);
                        }

                        const optionFailures = await page.locator('.pergola-option').evaluateAll((cards) => cards.map((card) => {
                          const body = card.querySelector(':scope > div');
                          const image = card.querySelector('img');
                          const title = card.querySelector('h3');
                          const paragraph = card.querySelector('p:last-child');
                          return {
                            title: title?.textContent.trim(),
                            bodyPadding: body ? parseFloat(getComputedStyle(body).paddingLeft) : 0,
                            imageHeight: image?.getBoundingClientRect().height || 0,
                            titleSize: title ? parseFloat(getComputedStyle(title).fontSize) : 0,
                            paragraphSize: paragraph ? parseFloat(getComputedStyle(paragraph).fontSize) : 0,
                          };
                        }).filter((item) => item.bodyPadding < 18 || item.imageHeight < 150 || item.titleSize < 14 || item.paragraphSize < 14));
                        if (optionFailures.length) {
                          throw new Error(`Options readability failure at ${width}px: ${JSON.stringify(optionFailures)}`);
                        }

                        await page.screenshot({ path: `screenshots/pergolas-${width}.png`, fullPage: true });
                        await page.close();
                      }

                      await browser.close();
                      fs.writeFileSync('.verification/pergolas-mobile-success.txt', [
                        'status=success',
                        `source_commit=${process.env.GITHUB_SHA}`,
                        `verified_widths=${widths.join(',')}`,
                        'heading_policy=nowrap-v3',
                        'options_readability=success',
                        `verified_at=${new Date().toISOString()}`,
                        ''
                      ].join('\n'));
                    })();
                    NODE

                - name: Upload screenshots
                  uses: actions/upload-artifact@v4
                  with:
                    name: pergolas-mobile-screenshots
                    path: screenshots/*.png
                    retention-days: 7

                - name: Record successful verification
                  run: |
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add .verification/pergolas-mobile-success.txt
                    git commit -m "chore: record pergola mobile verification" || exit 0
                    git pull --rebase origin main
                    git push origin HEAD:main
          ''')

          smoke_path = Path('.github/workflows/production-smoke.yml')
          smoke_path.write_text(r'''name: Production smoke check

          on:
            push:
              branches: [main]
              paths-ignore:
                - '.deployment/**'
                - '.verification/**'
            workflow_dispatch:

          permissions:
            contents: write

          concurrency:
            group: production-smoke
            cancel-in-progress: true

          jobs:
            smoke:
              runs-on: ubuntu-latest
              timeout-minutes: 12
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                  with:
                    ref: main

                - name: Verify production pergola pages
                  run: |
                    set -euo pipefail
                    home_url="https://raluma.com.ru/"
                    url="https://raluma.com.ru/pergolas/"
                    asset="https://raluma.com.ru/images/pergolas/project-hero.webp"

                    for attempt in $(seq 1 60); do
                      home_html="$(curl -fsSL --connect-timeout 15 --max-time 30 "$home_url" || true)"
                      html="$(curl -fsSL --connect-timeout 15 --max-time 30 "$url" || true)"
                      asset_status="$(curl -sSIL --connect-timeout 15 --max-time 30 -o /dev/null -w '%{http_code}' "$asset" || true)"

                      if grep -q 'data-mobile-layout="nowrap-v3"' <<<"$home_html" \
                        && grep -q 'data-mobile-layout="nowrap-v3"' <<<"$html" \
                        && grep -q 'Цвета, стекло и комфорт' <<<"$html" \
                        && [ "$asset_status" = "200" ]; then
                        echo "Production deployment verified: $home_url and $url"
                        mkdir -p .deployment
                        {
                          echo "status=success"
                          echo "home_url=$home_url"
                          echo "url=$url"
                          echo "asset=$asset"
                          echo "mobile_layout=nowrap-v3"
                          echo "source_commit=${GITHUB_SHA}"
                          echo "verified_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
                        } > .deployment/last-success.txt
                        exit 0
                      fi

                      echo "Attempt $attempt: production is not updated yet (asset HTTP $asset_status)"
                      sleep 10
                    done

                    echo "Production deployment was not verified"
                    exit 1

                - name: Record successful deployment check
                  run: |
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add .deployment/last-success.txt
                    git commit -m "chore: record successful production deployment" || exit 0
                    git pull --rebase origin main
                    git push origin HEAD:main
          ''')

          Path('.github/workflows/apply-pergola-nowrap-v3.yml').unlink()
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/pergolas.astro \
                  src/components/sections/PergolasTeaserSection.astro \
                  src/styles/pergolas-mobile-first.css \
                  src/layouts/BaseLayout.astro \
                  .github/workflows/pergolas-mobile-visual.yml \
                  .github/workflows/production-smoke.yml \
                  .github/workflows/apply-pergola-nowrap-v3.yml
          git commit -m "fix: keep pergola headings single-line on mobile"
          git pull --rebase origin main
          git push origin HEAD:main
