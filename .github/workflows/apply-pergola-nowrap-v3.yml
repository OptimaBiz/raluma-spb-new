name: Apply pergola nowrap mobile fixes

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-pergola-nowrap-v3.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/apply_pergola_nowrap_v3.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep pergola headings single-line on mobile"
          git pull --rebase origin main
          git push origin HEAD:main
