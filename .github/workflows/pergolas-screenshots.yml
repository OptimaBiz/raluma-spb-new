name: Pergolas screenshots

on:
  push:
    branches:
      - agent/add-pergolas-landing
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start preview
        run: |
          npm run build
          npm run preview -- --host 127.0.0.1 > /tmp/raluma-preview.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4321/pergolas/ && break
            sleep 2
          done
      - name: Capture screenshots
        run: |
          mkdir -p screenshots
          npx playwright screenshot --device="Desktop Chrome HiDPI" --full-page http://127.0.0.1:4321/pergolas/ screenshots/pergolas-desktop.png
          npx playwright screenshot --device="iPhone 13" --full-page http://127.0.0.1:4321/pergolas/ screenshots/pergolas-mobile.png
      - uses: actions/upload-artifact@v4
        with:
          name: pergolas-screenshots
          path: screenshots/*.png
          retention-days: 3
