name: Production smoke check

on:
  push:
    branches: [main]
    paths-ignore:
      - '.deployment/**'
      - '.verification/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify production pergola pages
        run: |
          set -euo pipefail
          home_url="https://raluma.com.ru/"
          url="https://raluma.com.ru/pergolas/"
          asset="https://raluma.com.ru/images/pergolas/project-hero.webp"

          for attempt in $(seq 1 60); do
            home_html="$(curl -fsSL --connect-timeout 15 --max-time 30 "$home_url" || true)"
            html="$(curl -fsSL --connect-timeout 15 --max-time 30 "$url" || true)"
            asset_status="$(curl -sSIL --connect-timeout 15 --max-time 30 -o /dev/null -w '%{http_code}' "$asset" || true)"

            if grep -q "nowrap-v3" <<<"$home_html" \
              && grep -q "nowrap-v3" <<<"$html" \
              && grep -q "Цвета, стекло и комфорт" <<<"$html" \
              && [ "$asset_status" = "200" ]; then
              echo "Production deployment verified: $home_url and $url"
              mkdir -p .deployment
              {
                echo "status=success"
                echo "home_url=$home_url"
                echo "url=$url"
                echo "asset=$asset"
                echo "mobile_layout=nowrap-v3"
                echo "source_commit=${GITHUB_SHA}"
                echo "verified_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              } > .deployment/last-success.txt
              exit 0
            fi

            echo "Attempt $attempt: production is not updated yet (asset HTTP $asset_status)"
            sleep 10
          done

          echo "Production deployment was not verified"
          exit 1

      - name: Record successful deployment check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .deployment/last-success.txt
          git commit -m "chore: record successful production deployment" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
