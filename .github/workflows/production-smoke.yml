name: Production smoke check

on:
  push:
    branches: [main]
    paths-ignore:
      - '.deployment/**'
      - '.verification/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup image verifier
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image verifier
        run: python -m pip install --quiet pillow

      - name: Verify production pergola pages and real image pixels
        run: |
          set -euo pipefail
          home_url="https://raluma.com.ru/"
          url="https://raluma.com.ru/pergolas/"
          hero_asset="https://raluma.com.ru/images/pergolas/project-hero.webp"
          closed_asset="https://raluma.com.ru/images/pergolas/roof-closed.jpg?v=7"
          half_asset="https://raluma.com.ru/images/pergolas/roof-half-open.jpg?v=7"
          open_asset="https://raluma.com.ru/images/pergolas/roof-open.jpg?v=7"

          for attempt in $(seq 1 60); do
            home_html="$(curl -fsSL --connect-timeout 15 --max-time 30 "$home_url" || true)"
            html="$(curl -fsSL --connect-timeout 15 --max-time 30 "$url" || true)"
            hero_status="$(curl -sSIL --connect-timeout 15 --max-time 30 -o /dev/null -w '%{http_code}' "$hero_asset" || true)"
            closed_status="$(curl -sSL --connect-timeout 15 --max-time 30 -o /tmp/roof-closed.jpg -w '%{http_code}' "$closed_asset" || true)"
            half_status="$(curl -sSL --connect-timeout 15 --max-time 30 -o /tmp/roof-half-open.jpg -w '%{http_code}' "$half_asset" || true)"
            open_status="$(curl -sSL --connect-timeout 15 --max-time 30 -o /tmp/roof-open.jpg -w '%{http_code}' "$open_asset" || true)"

            pixels_ok=false
            if [ "$closed_status" = "200" ] && [ "$half_status" = "200" ] && [ "$open_status" = "200" ]; then
              if python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageChops, ImageStat

          paths = [
              Path('/tmp/roof-closed.jpg'),
              Path('/tmp/roof-half-open.jpg'),
              Path('/tmp/roof-open.jpg'),
          ]
          images = []
          for path in paths:
              with Image.open(path) as source:
                  source.load()
                  image = source.convert('RGB')
              if image.width < 480 or image.height < 300:
                  raise SystemExit(f'{path.name}: invalid size {image.size}')
              gray = image.convert('L')
              low, high = gray.getextrema()
              stats = ImageStat.Stat(gray)
              mean = float(stats.mean[0])
              deviation = float(stats.stddev[0])
              if high - low < 18 or deviation < 5 or mean < 8:
                  raise SystemExit(
                      f'{path.name}: blank/dark pixels range={low}..{high}, '
                      f'mean={mean:.2f}, stddev={deviation:.2f}'
                  )
              images.append(image.resize((480, 312)))

          for left_index in range(len(images)):
              for right_index in range(left_index + 1, len(images)):
                  difference = ImageChops.difference(images[left_index], images[right_index])
                  rms = sum(ImageStat.Stat(difference).rms) / 3
                  if rms < 4:
                      raise SystemExit(
                          f'roof modes {left_index + 1} and {right_index + 1} look identical: rms={rms:.2f}'
                      )

          print('three official roof photos decode, contain visible pixels, and differ from one another')
          PY
              then
                pixels_ok=true
              fi
            fi

            if grep -q "adaptive-type-v6" <<<"$html" \
              && grep -q "fitHeading" <<<"$html" \
              && grep -q "data-roof-real-photos=\"v7\"" <<<"$html" \
              && grep -q "data-roof-photo-v7" <<<"$html" \
              && grep -q "roof-closed.jpg?v=7" <<<"$html" \
              && grep -q "roof-half-open.jpg?v=7" <<<"$html" \
              && grep -q "roof-open.jpg?v=7" <<<"$html" \
              && grep -q "Полуоткрыта" <<<"$html" \
              && grep -q "3.jpg.webp" <<<"$html" \
              && grep -q "pergola-glazing__cta-row" <<<"$html" \
              && grep -q "horizontalIntentUntil" <<<"$home_html" \
              && [ "$hero_status" = "200" ] \
              && [ "$pixels_ok" = "true" ]; then
              echo "Production deployment verified with three official decoded roof photos: $url"
              mkdir -p .deployment
              {
                echo "status=success"
                echo "home_url=$home_url"
                echo "url=$url"
                echo "asset=$hero_asset"
                echo "roof_closed_asset=$closed_asset"
                echo "roof_half_open_asset=$half_asset"
                echo "roof_open_asset=$open_asset"
                echo "roof_source=https://raluma.ru/pergolas#rec894214390"
                echo "mobile_layout=adaptive-type-v6"
                echo "roof_controls=three-official-photos-v7"
                echo "roof_animation=continuous-crossfade-until-interaction"
                echo "roof_pixel_validation=decoded-visible-distinct"
                echo "roof_corrupted_webp=removed-from-runtime"
                echo "roof_browser_sprite_cropping=removed"
                echo "roof_legacy_css=disabled"
                echo "size_cards=responsive-contain"
                echo "systems_vertical_scroll=protected"
                echo "mobile_text_clipping=prevented"
                echo "source_commit=${GITHUB_SHA}"
                echo "verified_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              } > .deployment/last-success.txt
              exit 0
            fi

            echo "Attempt $attempt: production not ready (hero $hero_status, closed $closed_status, half $half_status, open $open_status, pixels $pixels_ok)"
            sleep 10
          done

          echo "Production deployment was not verified"
          exit 1

      - name: Record successful deployment check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .deployment/last-success.txt
          git commit -m "chore: record successful production deployment" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
