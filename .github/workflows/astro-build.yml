name: Verify pergola landing

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/raluma-preview.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4321/pergolas/ >/dev/null && break
            sleep 2
          done
      - name: Capture fully revealed screenshots
        run: |
          mkdir -p screenshots
          node <<'NODE'
          const { chromium, devices } = require('playwright');
          const reveal = async (page) => {
            await page.addStyleTag({ content: `
              .rise, .is-visible, [data-reveal] {
                opacity: 1 !important;
                transform: none !important;
                visibility: visible !important;
              }
              *, *::before, *::after {
                animation-delay: 0s !important;
                animation-duration: 0s !important;
                transition-delay: 0s !important;
                transition-duration: 0s !important;
              }
            ` });
            await page.evaluate(async () => {
              for (let y = 0; y < document.body.scrollHeight; y += window.innerHeight * 0.75) {
                window.scrollTo(0, y);
                await new Promise(resolve => setTimeout(resolve, 80));
              }
              window.scrollTo(0, 0);
            });
            await page.waitForTimeout(500);
          };
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const desktop = await browser.newPage({ viewport: { width: 1440, height: 1200 }, deviceScaleFactor: 1 });
            await desktop.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle', timeout: 120000 });
            await reveal(desktop);
            await desktop.screenshot({ path: 'screenshots/pergolas-desktop.png', fullPage: true });
            const mobileContext = await browser.newContext({ ...devices['iPhone 13'] });
            const mobile = await mobileContext.newPage();
            await mobile.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle', timeout: 120000 });
            await reveal(mobile);
            await mobile.screenshot({ path: 'screenshots/pergolas-mobile.png', fullPage: true });
            await mobileContext.close();
            await browser.close();
          })();
          NODE
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: pergolas-revealed-screenshots
          path: screenshots/*.png
          retention-days: 3
