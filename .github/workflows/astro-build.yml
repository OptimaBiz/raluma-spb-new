name: Localize pergola images and verify

on:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download official Raluma pergola images
        run: |
          set -euo pipefail
          mkdir -p public/images/pergolas

          download() {
            local url="$1"
            local output="$2"
            curl -fL --retry 3 --retry-delay 2 --connect-timeout 20 --max-time 120 \
              -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36" \
              -H "Referer: https://raluma.ru/pergolas" \
              "$url" -o "$output"
            test "$(stat -c%s "$output")" -gt 5000
          }

          download "https://static.tildacdn.com/tild3533-6633-4535-b039-323632373730/1.jpg" "public/images/pergolas/louvered-1.jpg"
          download "https://static.tildacdn.com/tild3730-3338-4066-b261-626564313738/2.jpg" "public/images/pergolas/glass-2.jpg"
          download "https://static.tildacdn.com/tild3830-6335-4235-a337-663062393435/3.jpg" "public/images/pergolas/hero-3.jpg"
          download "https://static.tildacdn.com/tild3230-3532-4638-b336-623064663766/photo.png" "public/images/pergolas/finishes.png"
          download "https://static.tildacdn.com/tild3266-3031-4862-a333-626433303433/4.png" "public/images/pergolas/glass-options.png"
          download "https://static.tildacdn.com/tild3430-6261-4338-a630-623431613434/5.png" "public/images/pergolas/comfort-options.png"

          file public/images/pergolas/*
          ls -lh public/images/pergolas

      - name: Point the landing to local assets
        run: |
          python <<'PY'
          from pathlib import Path

          replacements = {
              "https://static.tildacdn.com/tild3830-6335-4235-a337-663062393435/3.jpg": "/images/pergolas/hero-3.jpg",
              "https://static.tildacdn.com/tild3533-6633-4535-b039-323632373730/1.jpg": "/images/pergolas/louvered-1.jpg",
              "https://static.tildacdn.com/tild3730-3338-4066-b261-626564313738/2.jpg": "/images/pergolas/glass-2.jpg",
              "https://static.tildacdn.com/tild3230-3532-4638-b336-623064663766/photo.png": "/images/pergolas/finishes.png",
              "https://static.tildacdn.com/tild3266-3031-4862-a333-626433303433/4.png": "/images/pergolas/glass-options.png",
              "https://static.tildacdn.com/tild3430-6261-4338-a630-623431613434/5.png": "/images/pergolas/comfort-options.png",
          }

          paths = [
              Path("src/pages/pergolas.astro"),
              Path("src/components/sections/PergolasTeaserSection.astro"),
          ]

          for path in paths:
              text = path.read_text()
              for old, new in replacements.items():
                  text = text.replace(old, new)
              path.write_text(text)
          PY

      - name: Commit local image assets
        run: |
          if git diff --quiet -- src/pages/pergolas.astro src/components/sections/PergolasTeaserSection.astro public/images/pergolas; then
            echo "Local image assets are already applied"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/pages/pergolas.astro src/components/sections/PergolasTeaserSection.astro public/images/pergolas
            git commit -m "fix: bundle pergola images locally"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/raluma-preview.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4321/pergolas/ >/dev/null && break
            sleep 2
          done

      - name: Capture screenshots
        run: |
          mkdir -p screenshots
          node <<'NODE'
          const { chromium, devices } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const desktop = await browser.newPage({ viewport: { width: 1440, height: 1200 }, deviceScaleFactor: 1 });
            await desktop.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle', timeout: 120000 });
            await desktop.screenshot({ path: 'screenshots/pergolas-desktop.png', fullPage: true });
            const mobileContext = await browser.newContext({ ...devices['iPhone 13'] });
            const mobile = await mobileContext.newPage();
            await mobile.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle', timeout: 120000 });
            await mobile.screenshot({ path: 'screenshots/pergolas-mobile.png', fullPage: true });
            await mobileContext.close();
            await browser.close();
          })();
          NODE

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: pergolas-local-screenshots-${{ github.run_number }}
          path: screenshots/*.png
          retention-days: 3
