name: Diagnose pergola image downloads

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check official image URLs
        run: |
          set +e
          urls=(
            "https://static.tildacdn.com/tild3533-6633-4535-b039-323632373730/1.jpg"
            "https://static.tildacdn.com/tild3730-3338-4066-b261-626564313738/2.jpg"
            "https://static.tildacdn.com/tild3830-6335-4235-a337-663062393435/3.jpg"
            "https://static.tildacdn.com/tild3230-3532-4638-b336-623064663766/photo.png"
            "https://static.tildacdn.com/tild3266-3031-4862-a333-626433303433/4.png"
            "https://static.tildacdn.com/tild3430-6261-4338-a630-623431613434/5.png"
          )
          i=0
          for url in "${urls[@]}"; do
            i=$((i+1))
            echo "--- IMAGE $i ---"
            curl -L -sS --connect-timeout 20 --max-time 60 \
              -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36" \
              -H "Referer: https://raluma.ru/pergolas" \
              -w "HTTP=%{http_code} BYTES=%{size_download} TYPE=%{content_type}\n" \
              "$url" -o "/tmp/image-$i"
            file "/tmp/image-$i" 2>/dev/null || true
            wc -c "/tmp/image-$i" 2>/dev/null || true
          done
