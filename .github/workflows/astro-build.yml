name: Collect remaining pergola images

on:
  pull_request:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download remaining images
        run: |
          mkdir -p images
          get() {
            for attempt in 1 2 3 4 5; do
              curl -fL --connect-timeout 20 --max-time 120 \
                -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36" \
                -H "Referer: https://raluma.ru/pergolas" \
                "$1" -o "images/$2" && return 0
              sleep 2
            done
            rm -f "images/$2"
            return 0
          }
          get "https://static.tildacdn.com/tild3533-6633-4535-b039-323632373730/1.jpg" "01-louvered.jpg"
          get "https://static.tildacdn.com/tild3730-3338-4066-b261-626564313738/2.jpg" "02-glass.jpg"
          get "https://static.tildacdn.com/tild3266-3031-4862-a333-626433303433/4.png" "11-glass-options.png"
          get "https://static.tildacdn.com/tild3430-6261-4338-a630-623431613434/5.png" "12-comfort-options.png"
          file images/* || true
          ls -lh images
      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: remaining-pergola-images
          path: images/*
          if-no-files-found: warn
          retention-days: 3
