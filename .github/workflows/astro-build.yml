name: Fix pergola images and verify

on:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace thumbnail URLs with direct images
        run: |
          python <<'PY'
          from pathlib import Path

          replacements = {
              "https://thb.tildacdn.com/tild3830-6335-4235-a337-663062393435/-/resize/1900x/3.jpg": "https://static.tildacdn.com/tild3830-6335-4235-a337-663062393435/3.jpg",
              "https://thb.tildacdn.com/tild3533-6633-4535-b039-323632373730/-/resize/1500x/1.jpg": "https://static.tildacdn.com/tild3533-6633-4535-b039-323632373730/1.jpg",
              "https://thb.tildacdn.com/tild3730-3338-4066-b261-626564313738/-/resize/1500x/2.jpg": "https://static.tildacdn.com/tild3730-3338-4066-b261-626564313738/2.jpg",
              "https://thb.tildacdn.com/tild3533-6633-4535-b039-323632373730/-/resize/1000x/1.jpg": "https://static.tildacdn.com/tild3533-6633-4535-b039-323632373730/1.jpg",
              "https://thb.tildacdn.com/tild3730-3338-4066-b261-626564313738/-/resize/1000x/2.jpg": "https://static.tildacdn.com/tild3730-3338-4066-b261-626564313738/2.jpg",
              "https://thb.tildacdn.com/tild3830-6335-4235-a337-663062393435/-/resize/1000x/3.jpg": "https://static.tildacdn.com/tild3830-6335-4235-a337-663062393435/3.jpg",
              "https://thb.tildacdn.com/tild3230-3532-4638-b336-623064663766/-/resize/1100x/photo.png": "https://static.tildacdn.com/tild3230-3532-4638-b336-623064663766/photo.png",
              "https://thb.tildacdn.com/tild3266-3031-4862-a333-626433303433/-/resize/900x/4.png": "https://static.tildacdn.com/tild3266-3031-4862-a333-626433303433/4.png",
              "https://thb.tildacdn.com/tild3430-6261-4338-a630-623431613434/-/resize/900x/5.png": "https://static.tildacdn.com/tild3430-6261-4338-a630-623431613434/5.png",
              "https://thb.tildacdn.com/tild3830-6335-4235-a337-663062393435/-/resize/1800x/3.jpg": "https://static.tildacdn.com/tild3830-6335-4235-a337-663062393435/3.jpg",
          }

          paths = [
              Path("src/pages/pergolas.astro"),
              Path("src/components/sections/PergolasTeaserSection.astro"),
          ]

          replaced = 0
          for path in paths:
              text = path.read_text()
              for old, new in replacements.items():
                  count = text.count(old)
                  if count:
                      text = text.replace(old, new)
                      replaced += count
              path.write_text(text)

          print(f"Replaced URLs: {replaced}")
          if replaced == 0:
              print("Direct image URLs are already applied")
          PY

      - name: Commit image URL fix
        run: |
          if git diff --quiet -- src/pages/pergolas.astro src/components/sections/PergolasTeaserSection.astro; then
            echo "No image URL changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/pages/pergolas.astro src/components/sections/PergolasTeaserSection.astro
            git commit -m "fix: use direct pergola image URLs"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/raluma-preview.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4321/pergolas/ >/dev/null && break
            sleep 2
          done

      - name: Capture screenshots
        run: |
          mkdir -p screenshots
          node <<'NODE'
          const { chromium, devices } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const desktop = await browser.newPage({ viewport: { width: 1440, height: 1200 }, deviceScaleFactor: 1 });
            await desktop.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle', timeout: 120000 });
            await desktop.screenshot({ path: 'screenshots/pergolas-desktop.png', fullPage: true });
            const mobileContext = await browser.newContext({ ...devices['iPhone 13'] });
            const mobile = await mobileContext.newPage();
            await mobile.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle', timeout: 120000 });
            await mobile.screenshot({ path: 'screenshots/pergolas-mobile.png', fullPage: true });
            await mobileContext.close();
            await browser.close();
          })();
          NODE

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: pergolas-screenshots-${{ github.run_number }}
          path: screenshots/*.png
          retention-days: 3
