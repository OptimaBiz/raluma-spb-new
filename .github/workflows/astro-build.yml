name: Astro build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/raluma-preview.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4321/pergolas/ >/dev/null && break
            sleep 2
          done
      - name: Capture pergolas screenshots
        run: |
          mkdir -p screenshots
          npx playwright screenshot --viewport-size="1440,1200" --full-page http://127.0.0.1:4321/pergolas/ screenshots/pergolas-desktop.png
          npx playwright screenshot --device="iPhone 13" --full-page http://127.0.0.1:4321/pergolas/ screenshots/pergolas-mobile.png
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: pergolas-screenshots
          path: screenshots/*.png
          retention-days: 3
