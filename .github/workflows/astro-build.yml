name: Astro build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Audit parent pergolas image markup
        shell: python
        run: |
          import html
          import re
          import urllib.request

          source = urllib.request.urlopen('https://raluma.ru/pergolas', timeout=30).read().decode('utf-8', 'ignore')
          source = html.unescape(source).replace('\\/', '/')
          print('TILDACDN_COUNT', source.count('tildacdn'))
          for index, match in enumerate(re.finditer('tildacdn', source)):
              if index >= 80:
                  break
              start = max(0, match.start() - 130)
              end = min(len(source), match.start() + 260)
              print('ASSET_CONTEXT', re.sub(r'\\s+', ' ', source[start:end]))
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
