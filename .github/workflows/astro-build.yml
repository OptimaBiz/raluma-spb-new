name: Diagnose alternative pergola images

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check alternative official image URLs
        run: |
          set +e
          urls=(
            "https://thb.tildacdn.com/tild3830-6335-4235-a337-663062393435/-/resize/1900x/3.jpg"
            "https://optim.tildacdn.com/tild3530-6161-4263-b733-363830333934/-/cover/640x460/center/center/-/format/webp/_.jpg.webp"
            "https://static.tildacdn.com/tild3731-3034-4039-a565-306532636337/000002.jpg"
            "https://static.tildacdn.com/tild6662-3565-4336-b133-643330653536/-2.png"
            "https://static.tildacdn.com/tild3632-3637-4238-a239-666138373062/-1_1.png"
            "https://static.tildacdn.com/tild3136-3730-4038-a531-623333383130/__1.png"
            "https://static.tildacdn.com/tild3961-3635-4235-b837-353237626538/000002.jpg"
            "https://static.tildacdn.com/tild6339-3933-4966-a435-653731313937/IMG_7536.jpg"
            "https://static.tildacdn.com/tild6633-3131-4636-b935-396365313735/3.jpg"
            "https://static.tildacdn.com/tild3564-3936-4535-b639-396137393538/IMG_3165.jpg"
            "https://static.tildacdn.com/tild6463-6361-4738-b739-346133633231/IMG_3859.jpg"
            "https://static.tildacdn.com/tild6534-6366-4530-b064-633735396661/1.png"
            "https://static.tildacdn.com/tild6638-6463-4537-b435-323132643534/2.png"
            "https://static.tildacdn.com/tild3963-3739-4836-b138-383533663131/3.png"
          )
          i=0
          for url in "${urls[@]}"; do
            i=$((i+1))
            echo "--- IMAGE $i: $url ---"
            curl -L -sS --connect-timeout 20 --max-time 60 \
              -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36" \
              -H "Referer: https://raluma.ru/pergolas" \
              -w "HTTP=%{http_code} BYTES=%{size_download} TYPE=%{content_type}\n" \
              "$url" -o "/tmp/image-$i"
            file "/tmp/image-$i" 2>/dev/null || true
          done
