name: Verify pergola image rendering

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Start preview
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/raluma-preview.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4321/pergolas/ >/dev/null && break
            sleep 2
          done
      - name: Assert every landing image renders
        run: |
          mkdir -p screenshots
          node <<'NODE'
          const { chromium, devices } = require('playwright');

          async function prepare(page) {
            await page.goto('http://127.0.0.1:4321/pergolas/', { waitUntil: 'networkidle', timeout: 120000 });
            await page.evaluate(async () => {
              document.querySelectorAll('img').forEach((img) => {
                img.loading = 'eager';
                img.style.opacity = '1';
                img.style.visibility = 'visible';
              });
              document.querySelectorAll('.rise').forEach((el) => {
                el.classList.add('is-visible');
                el.style.opacity = '1';
                el.style.transform = 'none';
                el.style.visibility = 'visible';
              });
              for (let y = 0; y < document.body.scrollHeight; y += window.innerHeight * 0.6) {
                window.scrollTo(0, y);
                await new Promise((resolve) => setTimeout(resolve, 180));
              }
              await Promise.all([...document.images].map(async (img) => {
                if (!img.complete) await new Promise((resolve) => {
                  img.addEventListener('load', resolve, { once: true });
                  img.addEventListener('error', resolve, { once: true });
                });
                try { await img.decode(); } catch {}
              }));
              window.scrollTo(0, 0);
            });
            await page.waitForTimeout(800);
            const images = await page.locator('img').evaluateAll((items) => items.map((img) => ({
              src: img.currentSrc || img.src,
              complete: img.complete,
              naturalWidth: img.naturalWidth,
              naturalHeight: img.naturalHeight,
              renderedWidth: Math.round(img.getBoundingClientRect().width),
              renderedHeight: Math.round(img.getBoundingClientRect().height),
            })));
            console.log(JSON.stringify(images, null, 2));
            const broken = images.filter((img) => !img.complete || img.naturalWidth === 0 || img.naturalHeight === 0);
            if (broken.length) throw new Error(`Broken images: ${JSON.stringify(broken)}`);
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const desktop = await browser.newPage({ viewport: { width: 1440, height: 1200 } });
            await prepare(desktop);
            await desktop.screenshot({ path: 'screenshots/pergolas-desktop.png', fullPage: true });

            const context = await browser.newContext({ ...devices['iPhone 13'] });
            const mobile = await context.newPage();
            await prepare(mobile);
            await mobile.screenshot({ path: 'screenshots/pergolas-mobile.png', fullPage: true });
            await context.close();
            await browser.close();
          })();
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: pergolas-rendered-screenshots
          path: screenshots/*.png
          retention-days: 3
