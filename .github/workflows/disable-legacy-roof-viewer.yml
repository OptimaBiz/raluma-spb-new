name: Disable superseded roof viewer

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/disable-legacy-roof-viewer.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  disable:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Remove V5 roof initialization from shared enhancements
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/ui/PergolaPageEnhancements.astro')
          text = path.read_text(encoding='utf-8')
          old = '      initRoofInteraction();'
          new = '      // Roof interaction is owned exclusively by PergolaRoofPhotosV7.astro.'
          if text.count(old) != 1:
              raise SystemExit(f'expected one legacy initializer call, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Commit legacy viewer removal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ui/PergolaPageEnhancements.astro
          git commit -m "fix: disable corrupted legacy roof image initializer" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
